name: Cleanup Old Images
on:
  schedule:
    - cron: "0 0 * * 0" # Weekly on Sunday at midnight UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}

jobs:
  delete-older-than-90:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Cleanup old images
        uses: projectbluefin/actions/bootc-build/ghcr-cleanup@08de830cef4f8cb692df5271f7113e8d92f0a0a4 # v1
        with:
          # IMPORTANT: Update this to match your image name from Containerfile (# Name: comment)
          # This should match the "# Name: your-repo-name" comment in your Containerfile
          # Example: If your Containerfile has "# Name: my-custom-os", use "my-custom-os" here
          packages: finpilot
          older-than: 90 days
          keep-n-tagged: 7
          keep-n-untagged: 7
          github-token: ${{ secrets.GITHUB_TOKEN }}

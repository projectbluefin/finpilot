name: PR Validation

on:
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Validate
        uses: projectbluefin/actions/bootc-build/validate-pr@9f3b74b49b6023bd4401ae1bb81d1c3c02709716 # v1
        with:
          shellcheck-glob: "build/*.sh"
          dockerfile: "Containerfile"
          hadolint-config: ".hadolint.yaml"

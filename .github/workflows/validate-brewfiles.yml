name: Validate Brewfiles
permissions:
  contents: read

on:
  pull_request:
    paths:
      - "custom/brew/**"
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Homebrew
        uses: Homebrew/actions/setup-homebrew@100978dc923ea73ee9ed454d1d5c4fcf3ee14a9e # master

      - name: Validate Brewfiles
        shell: bash
        run: |
          echo "Validating Brewfiles in custom/brew/ directory..."

          find "custom/brew" -iname '*\.Brewfile*' -print0 | \
            while IFS= read -r -d '' brewfile ; do
              echo "::group:: ===$(basename "$brewfile")==="
              if brew bundle check --file="$brewfile" 2>&1; then
                echo "✓ $brewfile is valid"
              else
                echo "✗ $brewfile validation failed"
                exit 1
              fi
              echo "::endgroup::"
            done
